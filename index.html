<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stockify - Enterprise Stock Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: 'var(--brand-50)',
                100: 'var(--brand-100)',
                200: 'var(--brand-200)',
                300: 'var(--brand-300)',
                400: 'var(--brand-400)',
                500: 'var(--brand-500)',
                600: 'var(--brand-600)',
                700: 'var(--brand-700)',
                800: 'var(--brand-800)',
                900: 'var(--brand-900)',
                950: 'var(--brand-950)',
              },
              slate: {
                50: 'var(--slate-50)',
                100: 'var(--slate-100)',
                200: 'var(--slate-200)',
                300: 'var(--slate-300)',
                400: 'var(--slate-400)',
                500: 'var(--slate-500)',
                600: 'var(--slate-600)',
                700: 'var(--slate-700)',
                800: 'var(--slate-800)',
                900: 'var(--slate-900)',
                950: 'var(--slate-950)',
              },
              surface: {
                DEFAULT: 'var(--surface-default)',
                light: 'var(--surface-light)',
                border: 'var(--surface-border)'
              },
              black: 'var(--color-black)',
              white: 'var(--color-white)',
              background: 'var(--bg-base)',
              foreground: 'var(--text-base)',
            },
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-base: #f8fafc;
        --text-base: #0f172a;
        --surface-default: #ffffff;
        --surface-light: #f1f5f9;
        --surface-border: #e2e8f0;
        
        --color-black: #f8fafc;
        --color-white: #0f172a;
        
        --brand-50: #f0fdf4;
        --brand-100: #dcfce7;
        --brand-200: #bbf7d0;
        --brand-300: #86efac;
        --brand-400: #4ade80;
        --brand-500: #16a34a; /* Darker green for light mode */
        --brand-600: #15803d;
        --brand-700: #166534;
        --brand-800: #14532d;
        --brand-900: #14462b;
        --brand-950: #052e16;
        
        --slate-50: #050505;
        --slate-100: #0f172a;
        --slate-200: #1e293b;
        --slate-300: #334155;
        --slate-400: #475569;
        --slate-500: #64748b;
        --slate-600: #94a3b8;
        --slate-700: #cbd5e1;
        --slate-800: #e2e8f0;
        --slate-900: #f1f5f9;
        --slate-950: #f8fafc;
      }
      
      .dark {
        --bg-base: #050505;
        --text-base: #ffffff;
        --surface-default: #0f172a;
        --surface-light: #1e293b;
        --surface-border: #334155;
        
        --color-black: #050505;
        --color-white: #ffffff;
        
        --brand-50: #f7fee7;
        --brand-100: #ecfccb;
        --brand-200: #d9f99d;
        --brand-300: #bef264;
        --brand-400: #a3e635;
        --brand-500: #E2FF54; /* Neon Lime */
        --brand-600: #65a30d;
        --brand-700: #4d7c0f;
        --brand-800: #3f6212;
        --brand-900: #365314;
        --brand-950: #1a2e05;
        
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --slate-900: #0f172a;
        --slate-950: #050505;
      }

      body { 
        font-family: 'Space Grotesk', sans-serif; 
        background-color: var(--bg-base); 
        color: var(--text-base);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-base);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--surface-light);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--surface-border);
      }
      .custom-scrollbar::-webkit-scrollbar {
        height: 8px;
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: var(--surface-default);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--surface-border);
        border-radius: 4px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
